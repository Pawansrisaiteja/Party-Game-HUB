<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Party Hub">
<meta name="theme-color" content="#0d0120">
<title>🎉 Party Hub — 100 Games</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap');
:root{--bg:#0d0120;--bg2:#1a0533;--card:#1e0d3a;--card2:#2a1050;--accent:#ff4fd8;--accent2:#7c3aed;--accent3:#06b6d4;--gold:#fbbf24;--green:#10b981;--red:#ef4444;--text:#f3e8ff;--muted:#a78bfa;--r:16px;--sh:0 8px 32px rgba(124,58,237,.3);--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);height:100%;overflow:hidden;touch-action:manipulation}
.screen{display:none;flex-direction:column;height:100dvh;overflow:hidden}
.screen.active{display:flex}
#homeScreen{background:radial-gradient(ellipse at 20% 20%,#3b0764,#0d0120 60%),radial-gradient(ellipse at 80% 80%,#1e3a5f,transparent 50%);overflow-y:auto;padding-bottom:calc(20px + var(--sb))}
.home-header{padding:calc(18px + var(--st)) 20px 14px;text-align:center}
.home-title{font-family:'Fredoka One',cursive;font-size:clamp(2rem,8vw,3.5rem);background:linear-gradient(135deg,#ff4fd8,#a855f7,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 30px rgba(255,79,216,.4))}
.home-sub{color:var(--muted);font-size:.9rem;margin-top:4px;font-weight:700}
.badge-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px}
.badge{background:var(--card2);border:1px solid rgba(124,58,237,.4);border-radius:20px;padding:3px 10px;font-size:.72rem;font-weight:800;color:var(--muted)}
.player-setup{background:var(--card);border:1px solid rgba(124,58,237,.3);border-radius:var(--r);margin:0 14px 14px;padding:16px}
.setup-title{font-weight:900;font-size:.95rem;color:var(--gold);margin-bottom:10px}
.pc-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.cnt-btn{width:40px;height:40px;border-radius:50%;border:2px solid var(--accent2);background:transparent;color:var(--text);font-size:1.3rem;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.cnt-btn:active{transform:scale(.9);background:var(--accent2)}
.cnt-disp{flex:1;text-align:center;font-family:'Fredoka One',cursive;font-size:2rem;color:var(--accent)}
.p-inputs{display:flex;flex-direction:column;gap:7px}
.p-input{background:var(--card2);border:1.5px solid rgba(124,58,237,.3);border-radius:10px;padding:9px 13px;color:var(--text);font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:700;outline:none;-webkit-appearance:none}
.p-input:focus{border-color:var(--accent)}
.p-input::placeholder{color:rgba(167,139,250,.4)}
.cat-scroll{display:flex;gap:8px;overflow-x:auto;padding:0 14px 10px;scrollbar-width:none}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-btn{flex-shrink:0;background:var(--card);border:1.5px solid rgba(124,58,237,.3);border-radius:20px;padding:5px 13px;color:var(--muted);font-weight:800;font-size:.78rem;cursor:pointer;transition:.15s;white-space:nowrap}
.cat-btn.on,.cat-btn:active{background:var(--accent2);border-color:var(--accent2);color:#fff}
.srch-wrap{padding:0 14px 10px}
.srch{width:100%;background:var(--card);border:1.5px solid rgba(124,58,237,.3);border-radius:12px;padding:9px 13px;color:var(--text);font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:700;outline:none;-webkit-appearance:none}
.srch:focus{border-color:var(--accent)}
.srch::placeholder{color:rgba(167,139,250,.4)}
.gcnt{padding:0 14px 6px;font-size:.78rem;color:var(--muted);font-weight:700}
.ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;padding:0 14px 20px}
@media(min-width:600px){.ggrid{grid-template-columns:repeat(auto-fill,minmax(175px,1fr))}}
@media(min-width:900px){.ggrid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}}
.gcard{background:var(--card);border:1px solid rgba(124,58,237,.22);border-radius:var(--r);padding:14px 11px 12px;cursor:pointer;transition:.15s;position:relative;overflow:hidden;user-select:none}
.gcard::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,79,216,.08),transparent 60%);opacity:0;transition:.2s}
.gcard:hover::before,.gcard:active::before{opacity:1}
.gcard:hover{transform:translateY(-3px);box-shadow:var(--sh);border-color:rgba(124,58,237,.5)}
.gcard:active{transform:scale(.97)}
.gem{font-size:2rem;line-height:1;margin-bottom:7px;display:block}
.gnm{font-weight:900;font-size:.85rem;line-height:1.2;margin-bottom:5px}
.gpl{font-size:.68rem;font-weight:700;color:var(--muted)}
.gcat{position:absolute;top:8px;right:8px;font-size:.58rem;font-weight:800;padding:2px 5px;border-radius:7px;text-transform:uppercase;letter-spacing:.05em}
.c-party{background:rgba(255,79,216,.15);color:#ff4fd8}
.c-word{background:rgba(6,182,212,.15);color:#06b6d4}
.c-trivia{background:rgba(251,191,36,.15);color:#fbbf24}
.c-active{background:rgba(16,185,129,.15);color:#10b981}
.c-strategy{background:rgba(124,58,237,.15);color:#a78bfa}
.c-creative{background:rgba(239,68,68,.15);color:#ef4444}
#gameScreen{background:radial-gradient(ellipse at 30% 10%,#3b0764,#0d0120 70%)}
.ghdr{padding:calc(12px + var(--st)) 14px 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(124,58,237,.2);flex-shrink:0}
.bk-btn{width:38px;height:38px;border-radius:10px;border:1.5px solid rgba(124,58,237,.4);background:transparent;color:var(--text);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bk-btn:active{background:var(--card2)}
.ghi{flex:1;min-width:0}
.ghn{font-family:'Fredoka One',cursive;font-size:1.25rem;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ghs{font-size:.72rem;color:var(--muted);font-weight:700}
.gcont{flex:1;overflow-y:auto;padding:14px;padding-bottom:calc(14px + var(--sb));-webkit-overflow-scrolling:touch}
.big-num{font-family:'Fredoka One',cursive;font-size:clamp(4rem,20vw,8rem);text-align:center;color:var(--accent);filter:drop-shadow(0 0 20px rgba(255,79,216,.5));line-height:1}
.big-txt{font-family:'Fredoka One',cursive;font-size:clamp(1.4rem,5vw,2.2rem);text-align:center;line-height:1.2}
.ginstr{background:var(--card);border:1px solid rgba(124,58,237,.3);border-radius:12px;padding:14px;margin:10px 0;font-size:.9rem;font-weight:700;line-height:1.5;color:var(--muted)}
.bbtn{width:100%;background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;border-radius:12px;padding:14px;color:#fff;font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;cursor:pointer;transition:.15s;margin-top:10px;box-shadow:0 4px 20px rgba(124,58,237,.4)}
.bbtn:active{transform:scale(.97);opacity:.9}
.bbtn.sec{background:var(--card2);box-shadow:none;border:1.5px solid rgba(124,58,237,.4)}
.bbtn.dan{background:linear-gradient(135deg,#7f1d1d,#ef4444)}
.bbtn.grn{background:linear-gradient(135deg,#064e3b,#10b981)}
.ppill{display:inline-flex;align-items:center;gap:5px;background:var(--card2);border:1.5px solid rgba(124,58,237,.4);border-radius:20px;padding:5px 12px;font-weight:800;font-size:.85rem;margin:3px}
.pav{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:900;flex-shrink:0}
.scrtbl{width:100%;border-collapse:collapse;margin:10px 0}
.scrtbl th,.scrtbl td{padding:9px 11px;text-align:left;border-bottom:1px solid rgba(124,58,237,.2)}
.scrtbl th{font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:800}
.scrtbl td{font-weight:700}
.scrtbl tr:first-child td{color:var(--gold)}
.timer{font-family:'Fredoka One',cursive;font-size:clamp(3rem,14vw,5.5rem);text-align:center;line-height:1;transition:color .3s}
.timer.ok{color:var(--accent3)}
.timer.urg{color:var(--red);animation:pulse .5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes winAnim{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes confFall{to{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 8px rgba(255,79,216,.5))}50%{filter:drop-shadow(0 0 28px rgba(255,79,216,.9))}}
.a-bounce{animation:bounce .6s infinite}
.a-spin{animation:spin 1s linear infinite}
.a-fade{animation:fadeIn .3s ease}
.a-win{animation:winAnim .5s ease forwards}
.a-glow{animation:glow 2s infinite}
.a-shake{animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.conf{position:fixed;width:10px;height:10px;border-radius:2px;animation:confFall linear forwards;z-index:9999;pointer-events:none}
.cpbanner{background:linear-gradient(135deg,rgba(124,58,237,.3),rgba(255,79,216,.2));border:2px solid var(--accent);border-radius:12px;padding:11px 14px;text-align:center;margin-bottom:12px;animation:fadeIn .3s ease}
.cpbanner .cpl{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.cpbanner .cpn{font-family:'Fredoka One',cursive;font-size:1.35rem;color:var(--accent)}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.cbtn{background:var(--card2);border:2px solid rgba(124,58,237,.3);border-radius:12px;padding:16px 9px;cursor:pointer;text-align:center;transition:.15s;font-weight:900;font-size:.9rem;color:var(--text)}
.cbtn:active,.cbtn:hover{border-color:var(--accent);transform:scale(.97)}
.cbtn .ce{font-size:1.9rem;display:block;margin-bottom:5px}
.2col{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}
.mc{background:var(--card);border:1px solid rgba(124,58,237,.3);border-radius:10px;padding:10px;text-align:center}
.mcv{font-family:'Fredoka One',cursive;font-size:1.7rem;color:var(--accent)}
.mcl{font-size:.7rem;font-weight:700;color:var(--muted);margin-top:2px}
.tq{font-weight:900;font-size:1.05rem;text-align:center;line-height:1.4;margin:14px 0;min-height:70px;display:flex;align-items:center;justify-content:center}
.topts{display:flex;flex-direction:column;gap:9px}
.topt{background:var(--card2);border:2px solid rgba(124,58,237,.3);border-radius:11px;padding:13px 14px;cursor:pointer;font-weight:800;transition:.15s;text-align:left}
.topt:active,.topt:hover{border-color:var(--accent)}
.topt.correct{border-color:var(--green);background:rgba(16,185,129,.15);color:var(--green)}
.topt.wrong{border-color:var(--red);background:rgba(239,68,68,.15);color:var(--red)}
.wdisp{font-family:'Fredoka One',cursive;font-size:clamp(1.6rem,7vw,3rem);text-align:center;letter-spacing:.05em;color:var(--gold);text-shadow:0 0 20px rgba(251,191,36,.4);margin:18px 0;min-height:70px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:6px}
.pbar-w{background:var(--card2);border-radius:8px;height:7px;margin:8px 0;overflow:hidden}
.pbar{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width .3s}
.pill-row{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin:8px 0}
.winner-s{text-align:center;padding:16px 0}
.w-trophy{font-size:4.5rem;display:block;margin-bottom:8px;animation:bounce 1s infinite}
.w-name{font-family:'Fredoka One',cursive;font-size:2.4rem;color:var(--gold);text-shadow:0 0 20px rgba(251,191,36,.5);margin-bottom:5px;animation:winAnim .5s ease}
.tod-pill{display:inline-block;padding:7px 18px;border-radius:20px;font-weight:900;font-size:.82rem;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.tod-pill.truth{background:rgba(6,182,212,.2);color:var(--accent3);border:1.5px solid var(--accent3)}
.tod-pill.dare{background:rgba(239,68,68,.2);color:var(--red);border:1.5px solid var(--red)}
.toast{position:fixed;top:calc(18px + var(--st));left:50%;transform:translateX(-50%);background:var(--card2);border:1.5px solid var(--accent);border-radius:10px;padding:10px 18px;font-weight:800;z-index:9998;animation:fadeIn .3s ease;white-space:nowrap;box-shadow:var(--sh);font-size:.9rem}
.tag-cloud{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin:10px 0}
.tag{background:var(--card2);border:1.5px solid rgba(124,58,237,.3);border-radius:20px;padding:5px 12px;font-weight:800;font-size:.82rem;cursor:pointer;transition:.15s;user-select:none}
.tag.sel{background:var(--accent2);border-color:var(--accent);color:#fff}
.tag:active{transform:scale(.95)}
.ltile{width:42px;height:50px;background:var(--card2);border:2px solid rgba(124,58,237,.4);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:1.35rem;cursor:pointer;transition:.15s;user-select:none}
.ltile.used{opacity:.3}
.ltile.correct{background:var(--green);border-color:var(--green);color:#fff}
.ltile.present{background:#d97706;border-color:#d97706;color:#fff}
.ltile.wrng{background:#374151;border-color:#374151}
.blank-w{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin:14px 0}
.blank-l{width:34px;border-bottom:3px solid var(--muted);height:44px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:3px;font-family:'Fredoka One',cursive;font-size:1.4rem;color:var(--text);transition:border-color .2s}
.blank-l.rev{border-color:var(--green);color:var(--green)}
.blank-l.bad{border-color:var(--red)}
.slist{max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:7px;padding-right:3px}
.slist::-webkit-scrollbar{width:4px}
.slist::-webkit-scrollbar-thumb{background:var(--accent2);border-radius:2px}
.teams-w{display:flex;gap:8px;margin:10px 0}
.team-b{flex:1;background:var(--card);border:1.5px solid rgba(124,58,237,.3);border-radius:12px;padding:10px;text-align:center}
.team-b.win{border-color:var(--gold);background:rgba(251,191,36,.08)}
.team-n{font-weight:900;font-size:.8rem;color:var(--muted);margin-bottom:5px}
.team-sc{font-family:'Fredoka One',cursive;font-size:2.4rem;color:var(--accent);line-height:1}
.die{width:75px;height:75px;background:#fff;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:2.4rem;color:#1a1a2e;box-shadow:0 5px 18px rgba(0,0,0,.4),inset 0 2px 3px rgba(255,255,255,.8);cursor:pointer;transition:.1s;user-select:none}
.die:active{transform:scale(.88) rotate(12deg)}
.die.rolling{animation:spin .3s linear 3}
.dice-w{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin:16px 0}
#hangmanCanvas{display:block;margin:0 auto}
#drawCanvas{border:2px solid rgba(124,58,237,.4);border-radius:12px;background:#fff;touch-action:none;cursor:crosshair;display:block;margin:0 auto;max-width:100%}
.draw-tools{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin:8px 0}
.cdot{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.1s}
.cdot.on{border-color:#fff;transform:scale(1.2)}
.num-in{background:var(--card2);border:2px solid rgba(124,58,237,.4);border-radius:10px;padding:14px;color:var(--text);font-family:'Fredoka One',cursive;font-size:1.9rem;text-align:center;width:100%;outline:none;-webkit-appearance:none}
.num-in:focus{border-color:var(--accent)}
.spinner-c{position:relative;width:270px;height:270px;margin:0 auto 16px}
#spinCanvas{border-radius:50%;box-shadow:0 8px 28px rgba(124,58,237,.5)}
.spin-ctr{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:22px;height:22px;background:#1a0533;border-radius:50%;border:3px solid #fff;z-index:10}
.reaction{font-size:3.8rem;text-align:center;animation:winAnim .4s ease,bounce .6s .4s infinite;display:block;margin:8px 0}
input,button{-webkit-appearance:none;border-radius:0}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
@media(min-width:768px){.gcont{max-width:580px;margin:0 auto}}
</style>
</head>
<body>
<div id="homeScreen" class="screen active">
  <div class="home-header">
    <div class="home-title">🎉 Party Hub</div>
    <div class="home-sub">100 Games · 2–10 Players · Anywhere</div>
    <div class="badge-row"><span class="badge">📱 iOS PWA</span><span class="badge">🤖 Android PWA</span><span class="badge">💻 Desktop</span></div>
  </div>
  <div class="player-setup">
    <div class="setup-title">👥 Players</div>
    <div class="pc-row">
      <button class="cnt-btn" onclick="chgP(-1)">−</button>
      <div class="cnt-disp" id="pcd">4</div>
      <button class="cnt-btn" onclick="chgP(1)">+</button>
    </div>
    <div class="p-inputs" id="pInputs"></div>
  </div>
  <div class="cat-scroll" id="catScroll"></div>
  <div class="srch-wrap"><input class="srch" type="text" id="srch" placeholder="🔍 Search 100 games..." oninput="rndGames()"></div>
  <div class="gcnt" id="gcnt"></div>
  <div class="ggrid" id="ggrid"></div>
</div>
<div id="gameScreen" class="screen">
  <div class="ghdr">
    <button class="bk-btn" onclick="goHome()">←</button>
    <div class="ghi"><div class="ghn" id="gtitle">Game</div><div class="ghs" id="gsub"></div></div>
    <div style="font-size:1.4rem" id="gemi">🎮</div>
  </div>
  <div class="gcont" id="gcont"></div>
</div>
<script>
const S={pc:4,ps:['Player 1','Player 2','Player 3','Player 4'],scores:{},cpIdx:0,ag:null,gd:{},ti:null,fcat:'All'};
const AVS=['🐱','🐶','🦊','🐼','🐨','🐯','🦁','🐸','🐙','🦋'];

const GAMES=[
  {id:1,n:'Truth or Dare',e:'🔥',c:'party',mn:2,mx:10,d:'Answer truths or complete dares!'},

  {id:6,n:'Roast Me',e:'😈',c:'party',mn:3,mx:10,d:'Friendly roasting contest!'},
  {id:7,n:'Spin the Bottle',e:'🍾',c:'party',mn:3,mx:10,d:'Classic party spinner!'},
  {id:8,n:'Two Truths One Lie',e:'🃏',c:'party',mn:3,mx:10,d:'Find the liar!'},
  {id:9,n:'Confess Box',e:'📦',c:'party',mn:3,mx:10,d:'Anonymous confessions revealed!'},
  {id:10,n:'Kiss Marry Avoid',e:'💋',c:'party',mn:2,mx:10,d:'Tough celebrity choices!'},
  {id:11,n:'Rate the Date',e:'💘',c:'party',mn:2,mx:10,d:'Rate outrageous date scenarios!'},
  {id:12,n:'Most Likely To',e:'🏆',c:'party',mn:3,mx:10,d:'Vote on who is most likely!'},
  {id:13,n:'Dare Roulette',e:'🎡',c:'party',mn:2,mx:10,d:'Spin for your dare!'},
  {id:14,n:'Paranoia',e:'😬',c:'party',mn:4,mx:10,d:'Whispered questions voted publicly!'},
  {id:15,n:'Question Ball',e:'⚽',c:'party',mn:3,mx:10,d:'Pass and answer!'},

function av(i){return AVS[i%AVS.length];}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function shuf(a){return [...a].sort(()=>Math.random()-.5);}
function sadd(n,v){if(!(n in S.scores))S.scores[n]=0;S.scores[n]+=v;}
function sboard(){const s=Object.entries(S.scores).sort((a,b)=>b[1]-a[1]);return`<table class="scrtbl"><thead><tr><th>Player</th><th>Score</th></tr></thead><tbody>${s.map(([n,v],i)=>`<tr><td>${['🥇','🥈','🥉'][i]||''} ${n}</td><td>${v}</td></tr>`).join('')}</tbody></table>`;}
function ppills(){return`<div class="pill-row">${ps().map((p,i)=>`<span class="ppill"><span class="pav" style="background:${pc2(i)}22;color:${pc2(i)}">${av(i)}</span>${p}</span>`).join('')}</div>`;}
function cpbanner(){const i=S.cpIdx%S.pc;return`<div class="cpbanner"><div class="cpl">Current Player</div><div class="cpn">${av(i)} ${ps()[i]}</div></div>`;}
function toast(m,d=2000){document.querySelectorAll('.toast').forEach(t=>t.remove());const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),d);}
function confetti(){const cs=['#ff4fd8','#7c3aed','#06b6d4','#fbbf24','#10b981','#ef4444'];for(let i=0;i<50;i++){const p=document.createElement('div');p.className='conf';p.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${pick(cs)};transform:rotate(${Math.random()*360}deg);animation-duration:${1+Math.random()*2}s;animation-delay:${Math.random()*.5}s;`;document.body.appendChild(p);setTimeout(()=>p.remove(),3000);}}
function startTimer(s,el,onEnd){let t=s;el.textContent=t;el.className='timer ok';S.ti=setInterval(()=>{t--;if(t<=0){clearInterval(S.ti);el.textContent='0';el.className='timer urg';onEnd();return;}el.textContent=t;if(t<=5)el.className='timer urg';},1000);}
function makeTriviaGame(pool,id){
  if(!S.gd.pool)S.gd.pool=shuf(pool);
  if(!S.gd.qi)S.gd.qi=0;
  const q=S.gd.pool[S.gd.qi%S.gd.pool.length];
  const opts=shuf(q.o);
  const gc=document.getElementById('gcont');
  gc.innerHTML=`${cpbanner()}<div class="tq">${q.q}</div><div class="topts">${opts.map(o=>`<div class="topt" onclick="trivAns(this,'${o.replace(/'/g,"&#39;")}','${q.a.replace(/'/g,"&#39;")}',${id})">${o}</div>`).join('')}</div><div id="tr${id}"></div>`;
}
function trivAns(el,sel,cor,id){
  document.querySelectorAll('.topt').forEach(e=>{e.onclick=null;if(e.textContent===cor)e.classList.add('correct');else if(e.textContent===sel&&sel!==cor)e.classList.add('wrong');});
  if(sel===cor){sadd(cp(),2);toast('✅ Correct! +2');}else toast(`❌ Wrong! ${cor}`);
  document.getElementById('tr'+id).innerHTML=`<button class="bbtn" style="margin-top:10px" onclick="S.gd.qi++;np();rndGame(${id})">Next →</button>`;
}

function init(){rndCats();rndPinputs();rndGames();}
function rndCats(){const el=document.getElementById('catScroll');el.innerHTML=CATS.map(c=>`<button class="cat-btn ${S.fcat===c?'on':''}" onclick="fcat('${c}')">${CATL[c]}</button>`).join('');}
function fcat(c){S.fcat=c;rndCats();rndGames();}
function chgP(d){S.pc=Math.max(2,Math.min(10,S.pc+d));while(S.ps.length<S.pc)S.ps.push('Player '+(S.ps.length+1));document.getElementById('pcd').textContent=S.pc;rndPinputs();}
function rndPinputs(){document.getElementById('pInputs').innerHTML=Array.from({length:S.pc},(_,i)=>`<input class="p-input" type="text" placeholder="${AVS[i]} Player ${i+1}" value="${S.ps[i]||''}" onchange="S.ps[${i}]=this.value||'Player ${i+1}'">`).join('');}
function rndGames(){const q=document.getElementById('srch').value.toLowerCase();const f=GAMES.filter(g=>(S.fcat==='All'||g.c===S.fcat)&&(!q||g.n.toLowerCase().includes(q)||g.d.toLowerCase().includes(q)));document.getElementById('gcnt').textContent=`Showing ${f.length} of 100 games`;document.getElementById('ggrid').innerHTML=f.map(g=>`<div class="gcard" onclick="launchGame(${g.id})"><span class="gem">${g.e}</span><div class="gcat c-${g.c}">${CATL[g.c].split(' ')[0]}</div><div class="gnm">${g.n}</div><div class="gpl">👥 ${g.mn}–${g.mx} · ${g.c}</div></div>`).join('');}
function goHome(){clearInterval(S.ti);document.getElementById('homeScreen').classList.add('active');document.getElementById('gameScreen').classList.remove('active');}
function launchGame(id){const g=GAMES.find(x=>x.id===id);if(!g)return;S.ag=g;S.cpIdx=0;S.scores={};S.gd={};ps().forEach(p=>S.scores[p]=0);document.getElementById('gtitle').textContent=g.n;document.getElementById('gsub').textContent=`${g.e} ${g.mn}–${g.mx} players`;document.getElementById('gemi').textContent=g.e;document.getElementById('homeScreen').classList.remove('active');document.getElementById('gameScreen').classList.add('active');rndGame(id);}
function rndGame(id){clearInterval(S.ti);const gc=document.getElementById('gcont');gc.innerHTML='';gc.scrollTop=0;if(GR[id])GR[id](gc);else defGame(gc);}
function defGame(gc){const g=S.ag;gc.innerHTML=`<div style="text-align:center"><div style="font-size:5rem;margin:20px 0">${g.e}</div><div class="big-txt">${g.n}</div><div class="ginstr">${g.d}<br><br>Play verbally with your group!</div>${ppills()}<button class="bbtn" onclick="rndGame(${g.id})">🔄 Restart</button><button class="bbtn sec" onclick="goHome()">🏠 Home</button></div>`;}

  if(!tb.started){gc.innerHTML=`${cpbanner()}<div class="ginstr">Answer as many questions correctly as possible in 60 seconds!</div><div style="font-size:4rem;text-align:center;margin:18px 0">💥</div><button class="bbtn" onclick="S.gd.tb.started=true;rndGame(99)">🚀 Start Blitz!</button>`;return;}
  const q=tb.pool[tb.qi%tb.pool.length];const opts=shuf(q.o);
  gc.innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0"><div class="mc"><div class="mcv" style="color:var(--green)">✅${tb.ok}</div><div class="mcl">Correct</div></div><div class="mc"><div class="mcv" style="color:var(--red)">❌${tb.wr}</div><div class="mcl">Wrong</div></div></div><div class="timer ${tb.tl<=10?'urg':'ok'}" id="tbT">${tb.tl}</div><div class="tq" style="font-size:.88rem">${q.q}</div><div class="topts">${opts.map(o=>`<div class="topt" onclick="TB99.a('${o.replace(/'/g,"&#39;")}','${q.a.replace(/'/g,"&#39;")}')">${o}</div>`).join('')}</div>`;
  if(!S.ti){let t=tb.tl;const dis=document.getElementById('tbT');S.ti=setInterval(()=>{t--;tb.tl=t;if(dis)dis.textContent=t;if(dis&&t<=10)dis.className='timer urg';if(t<=0){clearInterval(S.ti);S.ti=null;TB99.end();}},1000);}
  window.TB99={a(sel,cor){document.querySelectorAll('.topt').forEach(e=>e.onclick=null);if(sel===cor)tb.ok++;else tb.wr++;tb.qi++;setTimeout(()=>rndGame(99),250);},end(){const pts=tb.ok*2-tb.wr;sadd(cp(),Math.max(0,pts));document.getElementById('gcont').innerHTML=`<div class="winner-s"><span style="font-size:3.5rem">💥</span><div class="big-txt">Blitz Over!</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0"><div class="mc"><div class="mcv" style="color:var(--green)">${tb.ok}</div><div class="mcl">Correct</div></div><div class="mc"><div class="mcv" style="color:var(--red)">${tb.wr}</div><div class="mcl">Wrong</div></div></div><div class="mc"><div class="mcv" style="color:var(--gold)">+${Math.max(0,pts)}</div><div class="mcl">Points</div></div><button class="bbtn" style="margin-top:14px" onclick="S.gd.tb=null;np();rndGame(99)">Next Player</button></div>`;}};
},
100:(gc)=>{
  gc.innerHTML=`<div style="text-align:center;padding:8px 0"><div style="font-size:4rem;margin:8px 0">🎆</div><div class="big-txt" style="color:var(--gold)">Grand Finale!</div><div class="ginstr">The ultimate party showdown!</div></div>${ppills()}<div class="cgrid"><div class="cbtn" onclick="launchGame(44)"><span class="ce">🧠</span>Trivia Round</div><div class="cbtn" onclick="launchGame(13)"><span class="ce">🎯</span>Dare Round</div><div class="cbtn" onclick="launchGame(45)"><span class="ce">🎲</span>Luck Round</div><div class="cbtn" onclick="GF100.win()"><span class="ce">🏆</span>Declare Winner!</div></div><div class="ginstr">${sboard()}</div>`;
  window.GF100={win(){const s=Object.entries(S.scores).sort((a,b)=>b[1]-a[1]);const w=s[0][0];confetti();confetti();document.getElementById('gcont').innerHTML=`<div class="winner-s"><span class="w-trophy" style="font-size:5.5rem">🏆</span><div class="w-name" style="font-size:2.8rem">${w}</div><div style="color:var(--gold);font-size:1.1rem;margin-bottom:18px">🎉 Party Champion! 🎉</div><table class="scrtbl">${s.map(([n,v],i)=>`<tr><td>${['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟'][i]} ${n}</td><td>${v} pts</td></tr>`).join('')}</table><button class="bbtn" style="margin-top:14px" onclick="goHome()">🏠 Play More!</button></div>`;}};
},
};
// ── Auto-renderers for remaining games ──
function autoRender(id,gc){
  const g=GAMES.find(x=>x.id===id);if(!g){defGame(gc);return;}
  const c=g.c;
  if(c==='trivia'){const pool=shuf([...TQ_POP,...TQ_SCI,...TQ_GEO]);const q=pool[0];const opts=shuf(q.o);gc.innerHTML=`${cpbanner()}<div class="tq">${q.q}</div><div class="topts">${opts.map(o=>`<div class="topt" onclick="trivAns(this,'${o.replace(/'/g,"&#39;")}','${q.a.replace(/'/g,"&#39;")}',${id})">${o}</div>`).join('')}</div><div id="tr${id}"></div>`;}
  else if(c==='party'){const p=pick([...HOT_TAKES,...MOST_L,...WYR_P.map(x=>x.join(' OR '))]);gc.innerHTML=`${cpbanner()}<div style="font-size:2.5rem;text-align:center;margin:8px 0">${g.e}</div><div class="tq">${p}</div><div class="slist">${ps().map(p=>`<button class="bbtn sec" style="margin-top:5px" onclick="sadd('${p}',2);toast('${p} +2!');np();rndGame(${id})">👍 ${p}</button>`).join('')}</div><div class="ginstr">${sboard()}</div>`;}
  else if(c==='word'){const wd=pick(MEMORY_CHAINS.flat());gc.innerHTML=`${cpbanner()}<div class="wdisp a-glow">${wd}</div><div class="ginstr">Say a word connected to this! Be creative.</div><button class="bbtn" onclick="sadd(cp(),1);np();rndGame(${id})">✅ Accept (+1)</button><button class="bbtn dan" onclick="np();rndGame(${id})">❌ Reject</button>`;}
  else if(c==='active'){gc.innerHTML=`${cpbanner()}<div style="font-size:4rem;text-align:center;margin:18px 0">${g.e}</div><div class="ginstr">${g.d}<br><br>Complete the challenge! Others vote.</div><button class="bbtn" onclick="sadd(cp(),2);np();rndGame(${id})">✅ Done (+2)</button><button class="bbtn sec" onclick="np();rndGame(${id})">⏭️ Skip</button>`;}
  else if(c==='strategy'){gc.innerHTML=`${cpbanner()}<div class="big-num a-fade">${Math.floor(Math.random()*100)+1}</div><div class="ginstr">${g.d}</div><input class="num-in" id="st${id}" type="number" placeholder="Your guess..."><button class="bbtn" onclick="sadd(cp(),3);np();rndGame(${id})">Submit</button>`;}
  else if(c==='creative'){const p=pick([...IMPROV_P,...MOVIE_PITCH,...SUPERPOWERS]);gc.innerHTML=`${cpbanner()}<div style="font-size:3rem;text-align:center;margin:10px 0">${g.e}</div><div class="ginstr a-fade" style="font-size:1rem;color:var(--text);text-align:center">${p}</div><div class="ginstr">${g.d}</div><div class="slist">${ps().map(p=>`<button class="bbtn sec" style="margin-top:5px" onclick="sadd('${p}',3);toast('${p} wins! +3');np();rndGame(${id})">👑 ${p} wins</button>`).join('')}</div>`;}
  else defGame(gc);
}
